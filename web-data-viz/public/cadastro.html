<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UFC FIGHTING | Cadastro</title>

  <link href="https://fonts.googleapis.com/css2?family=Fugaz+One&display=swap" rel="stylesheet">

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>

  <div class="header">
    <div class="container">
      <h1 class="titulo">UFC FIGHTING</h1>

      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>

  <!-- Cadastro -->
  <div class="login">
    <div class="container">

      <div class="card card-cadastro">

        <h2>Bem-vindo!</h2>

        <div class="formulario">

          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome">
            <p id="nomeIn" style="display:none; color:red;">Nome inválido</p>
          </div>

          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com">
            <p id="emailIn" style="display:none; color:red;">E-mail inválido</p>
          </div>

          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******">
            <p id="senhaIn" style="display:none; color:red;">Senha inválida</p>
          </div>

          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******">
            <p id="confirmacaoIn" style="display:none; color:red;">As senhas não coincidem.</p>
          </div>

          <button class="botao" onclick="cadastrar()">Cadastrar</button>

          <div id="div_mensagem"></div>

        </div>

      </div>

    </div>
  </div>

  <div class="footer">
    <div class="container">
      <h4>Feito com amor por Samuel &hearts; SPTech &copy;</h4>
    </div>
  </div>

</body>

</html>

<script src="./js/validacoes.js"></script>

<script>

function cadastrar() {

    let nome = nome_input.value;
    let email = email_input.value;
    let senha = senha_input.value;
    let confirmacao = confirmacao_senha_input.value;

    nomeIn.style.display = "none";
    emailIn.style.display = "none";
    senhaIn.style.display = "none";
    confirmacaoIn.style.display = "none";

    if (!validarNome(nome)) {
        nomeIn.style.display = "block";
        return;
    }

    if (!validarEmail(email)) {
        emailIn.style.display = "block";
        return;
    }

    if (!validarSenha(senha)) {
        senhaIn.style.display = "block";
        return;
    }

    if (senha !== confirmacao) {
        confirmacaoIn.style.display = "block";
        return;
    }

    div_mensagem.innerHTML = "✅ Cadastro realizado! Redirecionando...";
    div_mensagem.style.color = "green";

    fetch("/usuarios/cadastrar", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify({
            nomeServer: nome,
            emailServer: email,
            senhaServer: senha
        }),
    })
    .then(function (resposta) {

        if (resposta.ok) {

            setTimeout(() => {
                window.location = "login.html";
            }, 2000);

        } else {

            div_mensagem.innerHTML = "Erro ao realizar cadastro.";
            div_mensagem.style.color = "red";

        }

    })
    .catch(function (erro) {

        console.log(erro);

        div_mensagem.innerHTML = "Erro ao conectar ao servidor.";
        div_mensagem.style.color = "red";

    });

}

</script>

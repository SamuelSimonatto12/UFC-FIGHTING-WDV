<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UFC-FIGHTING | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="janela">
        <div class="header-left">
            <h1>UFC-FIGHTING</h1>

            <div class="hello">
                <h3>Olá lutador, <span id="b_usuario">usuário</span>!</h3>
            </div>


            <div class="btn-nav">

                <h3>Gráficos</h3>

            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">

            <div class="kpis">

                <div class="card-kpi">
                    <h3>Comparações realizadas</h3>
                    <span id="kpiComparacoes">0</span>
                </div>

                <div class="card-kpi">
                    <h3>Lutador mais escolhido</h3>
                    <span id="kpiFavorito">---</span>
                </div>

                <div class="card-kpi">
                    <h3>Lutador mais vencedor</h3>
                    <span id="kpiVencedor">---</span>
                </div>

            </div>


            <div class="grafico-container">

                <h2>Quantidade de escolhas por lutador</h2>

                <canvas id="graficoEscolhas"></canvas>

            </div>

        </div>
    </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    window.onload = () => {
        carregarKPIs();
        carregarGrafico();
    };

    function carregarKPIs() {
        totalComparacoes();
        lutadorFavorito();
        lutadorMaisVencedor();
    }

    function totalComparacoes() {
        fetch(`/dash/totalComparacoes/${sessionStorage.ID_USUARIO}`)
            .then(res => res.json())
            .then(dados => {
                document.getElementById("kpiComparacoes").innerHTML = dados[0].total;
            })
            .catch(erro => console.log(erro));
    }

    function lutadorFavorito() {
        fetch(`/dash/lutadorFavorito/${sessionStorage.ID_USUARIO}`)
            .then(res => res.json())
            .then(dados => {
                document.getElementById("kpiFavorito").innerHTML = dados[0].nome;
            })
            .catch(erro => console.log(erro));
    }

    function lutadorMaisVencedor() {
        fetch(`/dash/lutadorMaisVencedor/${sessionStorage.ID_USUARIO}`)
            .then(res => res.json())
            .then(dados => {
                document.getElementById("kpiVencedor").innerHTML = dados[0].nome;
            })
            .catch(erro => console.log(erro));
    }

    function carregarGrafico() {

        fetch(`/dash/grafico/${sessionStorage.ID_USUARIO}`)
            .then(res => res.json())
            .then(resposta => {

                let nomes = [];
                let quantidade = [];

                for (let i = 0; i < resposta.length; i++) {
                    nomes.push(resposta[i].nome);
                    quantidade.push(resposta[i].quantidade);
                }

                const ctx = document.getElementById("graficoEscolhas");

                new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: nomes,
                        datasets: [{
                            label: "Quantidade de escolhas",
                            data: quantidade,
                            backgroundColor: "#d4af37",
                            borderColor: "#d4af37",
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                labels: {
                                    color: "#d4af37"
                                }
                            }
                        },
                        scales: {
                            x: {
                                ticks: {
                                    color: "#d4af37"
                                },
                                grid: {
                                    color: "#3a3a3a"
                                }
                            },
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    color: "#d4af37"
                                },
                                grid: {
                                    color: "#3a3a3a"
                                }
                            }
                        }
                    }
                });

            })
            .catch(erro => console.log(erro));
    }
</script>
